<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>iAngelo Quest V2 — Leyenda Definitiva</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap');

    :root {
      --gold: #c9a84c;
      --gold2: #f0d070;
      --gold3: #7a5c1e;
      --blood: #cc2222;
      --blood2: #ff4444;
      --dark: #050403;
      --dark2: #0d0a07;
      --dark3: #1a1410;
      --stone: #1e1810;
      --stone2: #2a2218;
      --stone3: #3a3025;
      --text: #e8d5a0;
      --muted: #8a7a55;
      --dim: #3a2a15;
      --fire: #ff6622;
      --ice: #88ddff;
      --pois: #44ff88;
      --shad: #aa44ff;
      --ui-bg: rgba(5, 4, 3, 0.92);
      --ui-b: 2px solid rgba(201, 168, 76, 0.45);
      --r: 6px;
      --tr: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --gg: 0 0 18px rgba(201, 168, 76, .4), 0 0 36px rgba(201, 168, 76, .2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'IM Fell English', serif;
      touch-action: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #cW {
      z-index: 1;
      pointer-events: all;
    }

    #cFx {
      z-index: 2;
    }

    #cWx {
      z-index: 3;
    }

    /* ── TITLE ── */
    #title {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 90% 90% at 50% 40%, #180e04, #050403);
      overflow: hidden;
    }

    .tparts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .tp {
      position: absolute;
      border-radius: 50%;
      animation: tpR linear infinite;
      opacity: 0;
    }

    @keyframes tpR {
      0% {
        opacity: 0;
        transform: translateY(0)scale(0)
      }

      10% {
        opacity: .9
      }

      90% {
        opacity: .2
      }

      100% {
        opacity: 0;
        transform: translateY(-100vh)scale(.4)
      }
    }

    .logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 900;
      background: linear-gradient(175deg, #fff9e0, var(--gold2) 28%, var(--gold) 55%, var(--gold3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 22px rgba(201, 168, 76, .55));
      animation: ls 3s ease-in-out infinite;
      letter-spacing: .08em;
    }

    @keyframes ls {

      0%,
      100% {
        filter: drop-shadow(0 4px 22px rgba(201, 168, 76, .5))
      }

      50% {
        filter: drop-shadow(0 4px 44px rgba(240, 208, 112, .95))
      }
    }

    .logo-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(.55rem, 1.3vw, .8rem);
      color: var(--muted);
      letter-spacing: .5em;
      text-transform: uppercase;
      margin: .4rem 0 1.5rem;
    }

    .phase {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      width: min(560px, 95vw);
    }

    .phase.on {
      display: flex;
    }

    .btn {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(.75rem, 1.4vw, .9rem);
      color: var(--dark);
      letter-spacing: .07em;
      padding: .75em 1.6em;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, var(--gold2), var(--gold) 50%, var(--gold3));
      clip-path: polygon(6px 0%, 100% 0%, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0% 100%, 0% 6px);
      transition: all var(--tr);
      box-shadow: 0 4px 14px rgba(201, 168, 76, .28);
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 35%;
      height: 200%;
      background: rgba(255, 255, 255, .13);
      transform: skewX(-20deg);
      transition: left .4s;
    }

    .btn:hover::after {
      left: 160%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 24px rgba(201, 168, 76, .52);
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn.sec {
      background: linear-gradient(180deg, var(--stone3), var(--stone2));
      color: var(--text);
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(180deg, #aa2222, #882020);
      color: #fff;
    }

    .btn2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      width: 100%;
    }

    /* Input fields */
    .inp {
      width: 100%;
      padding: 9px 12px;
      background: #0a0706;
      color: var(--text);
      border: 1px solid var(--gold3);
      border-radius: 4px;
      font-family: 'IM Fell English', serif;
      font-size: .9rem;
      outline: none;
    }

    .inp:focus {
      border-color: var(--gold);
    }

    .inp-label {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-align: left;
      width: 100%;
    }

    /* Class cards */
    .cgrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }

    @media(min-width:500px) {
      .cgrid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .ccard {
      background: rgba(18, 12, 6, .97);
      border: 2px solid rgba(201, 168, 76, .3);
      border-radius: 8px;
      padding: 14px 8px 10px;
      text-align: center;
      cursor: pointer;
      transition: all .22s;
      position: relative;
      overflow: hidden;
    }

    .ccard::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201, 168, 76, .07), transparent 65%);
      opacity: 0;
      transition: opacity .3s;
    }

    .ccard:hover::before,
    .ccard.on::before {
      opacity: 1;
    }

    .ccard:hover,
    .ccard.on {
      border-color: var(--gold);
      box-shadow: var(--gg);
      transform: translateY(-3px);
    }

    .ccard-svg {
      width: 72px;
      height: 72px;
      margin: 0 auto 8px;
      display: block;
    }

    .cn {
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      color: var(--gold);
    }

    .cd {
      font-size: .62rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }

    /* World cards */
    .wgrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }

    @media(min-width:500px) {
      .wgrid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .wcard {
      background: rgba(18, 12, 6, .97);
      border: 2px solid rgba(201, 168, 76, .28);
      border-radius: 8px;
      padding: 12px 7px;
      text-align: center;
      cursor: pointer;
      transition: all .22s;
      position: relative;
      overflow: hidden;
    }

    .wcard:hover,
    .wcard.on {
      border-color: var(--gold);
      box-shadow: var(--gg);
      transform: translateY(-2px);
    }

    .wcard-art {
      width: 60px;
      height: 60px;
      margin: 0 auto 6px;
      display: block;
      border-radius: 4px;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    #hud.on {
      display: block;
    }

    .hbars {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--ui-bg);
      border: var(--ui-b);
      border-radius: var(--r);
      padding: 8px 12px;
      pointer-events: all;
      backdrop-filter: blur(8px);
      min-width: 240px;
    }

    .prow {
      display: flex;
      gap: 9px;
      align-items: center;
      margin-bottom: 7px;
    }

    .port {
      width: 48px;
      height: 48px;
      border-radius: 5px;
      border: 2px solid var(--gold3);
      background: var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform var(--tr);
      box-shadow: var(--gg);
      overflow: hidden;
    }

    .port:hover {
      transform: scale(1.08);
    }

    .nlv {
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      color: var(--gold);
      cursor: pointer;
    }

    .nlv small {
      color: var(--muted);
      font-size: .62rem;
      display: block;
    }

    .bwrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brow {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .blbl {
      font-size: .58rem;
      letter-spacing: .05em;
      color: var(--muted);
      width: 18px;
      text-transform: uppercase;
    }

    .btrack {
      flex: 1;
      height: 9px;
      background: #080604;
      border: 1px solid rgba(201, 168, 76, .18);
      border-radius: 2px;
      overflow: hidden;
    }

    .bfill {
      height: 100%;
      border-radius: 2px;
      transition: width .35s ease;
    }

    .bfill.hp {
      background: linear-gradient(90deg, #5a0000, #cc2222, #ff4444);
    }

    .bfill.mp {
      background: linear-gradient(90deg, #000a33, #1133aa, #3366ff);
    }

    .bfill.xp {
      background: linear-gradient(90deg, #002211, #116633, #22ff88);
    }

    .bval {
      font-size: .56rem;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    .brow-buf {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .bufic {
      width: 22px;
      height: 22px;
      border-radius: 3px;
      background: var(--stone2);
      border: 1px solid var(--gold3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      position: relative;
    }

    .buft {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gold);
      border-radius: 0 0 3px 3px;
    }

    /* Boss HP bar at top */
    #boss-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 50;
      padding: 6px 14px 8px;
      background: rgba(5, 2, 2, .92);
      border-bottom: 2px solid #aa2200;
      backdrop-filter: blur(6px);
      display: none;
      transform: translateY(-100%);
      transition: transform .4s cubic-bezier(.34, 1.4, .64, 1);
    }

    #boss-bar.on {
      display: block;
      transform: translateY(0);
    }

    .boss-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: .82rem;
      color: #ff5555;
      text-align: center;
      text-shadow: 0 0 12px rgba(255, 68, 68, .7);
      letter-spacing: .1em;
      margin-bottom: 4px;
    }

    #boss-hp-track {
      width: 100%;
      height: 16px;
      background: #1a0000;
      border: 1px solid #aa2200;
      border-radius: 3px;
      overflow: hidden;
    }

    #boss-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #550000, #cc2200, #ff4422);
      transition: width .4s ease;
      position: relative;
    }

    #boss-hp-fill::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, .15);
      border-radius: 2px;
    }

    .boss-hp-val {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      color: #ff9999;
      text-align: center;
      margin-top: 3px;
    }

    /* Combo */
    #combo {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .35s;
    }

    #combo.on {
      opacity: 1;
    }

    .cbn {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(180deg, #fff, var(--gold2), var(--fire));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 170, 50, .8));
      line-height: 1;
      animation: cpop .28s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes cpop {
      from {
        transform: scale(.5)
      }

      to {
        transform: scale(1)
      }
    }

    .cbl {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: .3em;
      color: var(--gold);
    }

    /* Minimap */
    #mm {
      position: absolute;
      top: 8px;
      right: 8px;
      border: var(--ui-b);
      background: var(--dark);
      pointer-events: all;
    }

    .mml {
      font-family: 'Cinzel', serif;
      font-size: .55rem;
      letter-spacing: .07em;
      color: var(--muted);
      text-align: center;
      padding: 2px 0;
      border-top: 1px solid rgba(201, 168, 76, .18);
    }

    /* Hotbar */
    #hotbar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      pointer-events: all;
      background: var(--ui-bg);
      border: var(--ui-b);
      border-radius: 8px;
      padding: 4px 7px;
      backdrop-filter: blur(8px);
    }

    .skb {
      width: 48px;
      height: 48px;
      background: var(--stone);
      border: 2px solid var(--gold3);
      border-radius: 5px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: all var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .skb:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: var(--gg);
    }

    .ski {
      font-size: 1.4rem;
      line-height: 1;
    }

    .skk {
      position: absolute;
      bottom: 1px;
      right: 3px;
      font-family: 'Cinzel', serif;
      font-size: .48rem;
      color: var(--muted);
    }

    .skc {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: .44rem;
      color: #4488ff;
    }

    .cdov {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      font-weight: 700;
      color: #fff;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0);
    }

    .skb.cd .cdov {
      background: rgba(0, 0, 0, .65);
    }

    /* Quick item bar */
    #quickbar {
      position: absolute;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      pointer-events: all;
    }

    .qib {
      width: 38px;
      height: 38px;
      background: rgba(10, 6, 2, .9);
      border: 1px solid var(--gold3);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      position: relative;
      transition: all .15s;
    }

    .qib:hover {
      border-color: var(--gold);
      transform: scale(1.1);
    }

    .qib-count {
      position: absolute;
      bottom: 1px;
      right: 2px;
      font-size: .45rem;
      color: var(--gold);
      font-family: 'Cinzel', serif;
    }

    /* Action panel */
    .hact {
      position: absolute;
      bottom: 70px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: all;
    }

    .ab {
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      background: var(--ui-bg);
      border: var(--ui-b);
      color: var(--text);
      padding: 4px 9px;
      border-radius: var(--r);
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all var(--tr);
      white-space: nowrap;
    }

    .ab:hover {
      border-color: var(--gold);
      background: rgba(26, 16, 6, .97);
    }

    .ghud {
      position: absolute;
      bottom: 70px;
      left: 10px;
      background: var(--ui-bg);
      border: var(--ui-b);
      border-radius: var(--r);
      padding: 5px 9px;
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      color: var(--gold);
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    .pethud {
      position: absolute;
      bottom: 94px;
      left: 10px;
      background: var(--ui-bg);
      border: var(--ui-b);
      border-radius: var(--r);
      padding: 4px 9px;
      font-size: .7rem;
      color: var(--pois);
      pointer-events: none;
      backdrop-filter: blur(4px);
      display: none;
    }

    .pethud.on {
      display: block;
    }

    /* Combat log */
    #clog {
      position: absolute;
      bottom: 70px;
      left: 10px;
      width: 255px;
      max-height: 125px;
      overflow: hidden;
      pointer-events: none;
    }

    .cl {
      font-size: .68rem;
      line-height: 1.4;
      padding: 2px 6px;
      background: rgba(0, 0, 0, .55);
      border-left: 3px solid;
      margin-bottom: 2px;
      animation: sli .25s ease;
    }

    @keyframes sli {
      from {
        opacity: 0;
        transform: translateX(-10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .cl.dmg {
      color: #ff9999;
      border-color: var(--blood);
    }

    .cl.heal {
      color: #66ffaa;
      border-color: #22aa66;
    }

    .cl.xp {
      color: #ffdd66;
      border-color: var(--gold3);
    }

    .cl.sys {
      color: var(--ice);
      border-color: #4488aa;
    }

    .cl.boss {
      color: var(--fire);
      border-color: var(--fire);
      font-weight: 700;
    }

    .cl.loot {
      color: #ffcc00;
      border-color: #aa8800;
    }

    /* ── MOBILE JOYSTICK ── */
    #joy-zone {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 45%;
      height: 42%;
      z-index: 30;
      pointer-events: all;
      display: none;
    }

    #joy-zone.mob {
      display: block;
    }

    #joy-base {
      position: absolute;
      bottom: 22px;
      left: 22px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(201, 168, 76, .08);
      border: 2px solid rgba(201, 168, 76, .25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joy-stick {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 168, 76, .8), rgba(201, 168, 76, .3));
      border: 2px solid var(--gold);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 14px rgba(201, 168, 76, .5);
    }

    /* Mobile skill buttons ring */
    #mob-skills {
      position: fixed;
      bottom: 8px;
      right: 8px;
      width: 44%;
      height: 50%;
      z-index: 30;
      pointer-events: all;
      display: none;
    }

    #mob-skills.mob {
      display: block;
    }

    .mob-sk {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(10, 6, 2, .88);
      border: 2px solid var(--gold3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all .12s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .5);
    }

    .mob-sk:active {
      transform: scale(.88);
      background: rgba(201, 168, 76, .2);
    }

    .mob-sk.cd {
      opacity: .55;
    }

    /* Auto-attack button mobile */
    #mob-atk {
      position: fixed;
      bottom: 130px;
      right: 8px;
      z-index: 35;
      display: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(180, 30, 30, .9);
      border: 2px solid #ff4444;
      font-size: 1.6rem;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(255, 68, 68, .5);
      pointer-events: all;
    }

    #mob-atk.mob {
      display: flex;

    function drawMinimap() {
      if (!G) return;
      const mc = document.getElementById('mmc'), ctx = mc.getContext('2d');
      const m = MAPS[G.mapKey], tiles = G.allTiles[G.mapKey];
      const tw = mc.width / m.w, th = mc.height / m.h;
      ctx.clearRect(0, 0, mc.width, mc.height);
      for (let y = 0; y < m.h; y++)for (let x = 0; x < m.w; x++) {
        ctx.fillStyle = (tiles[y] && tiles[y][x] === 0) ? m.floor : '#080808'; ctx.fillRect(x * tw, y * th, tw + .5, th + .5);
      }
      G.enemies.forEach(en => { if (en.dead) return; ctx.fillStyle = en.boss ? '#ff4422' : en.col; ctx.fillRect(en.px / T * tw - 1.5, en.py / T * th - 1.5, 3, 3); });
      G.fakePlayers.forEach(fp => { if (fp.map !== G.mapKey) return; ctx.fillStyle = fp.col; ctx.fillRect(fp.px / T * tw - 2, fp.py / T * th - 2, 4, 4); });
      const p = G.p; ctx.fillStyle = CLASSES[p.cls].col;
      ctx.beginPath(); ctx.arc(p.px / T * tw, p.py / T * th, 4.2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    }

    // ── Float damage & burst ──
    function spawnFD(x, y, text, color, crit) {
      if (!G) return;
      const el = document.createElement('div'); el.className = 'fdmg' + (crit ? ' crit' : '');
      el.style.left = (x - G.camX - 18) + 'px'; el.style.top = (y - G.camY) + 'px';
      el.style.color = color; el.style.fontSize = crit ? '1.35rem' : '.88rem'; el.textContent = text;
      document.body.appendChild(el); setTimeout(() => el.remove(), 1200);
    }
    function burst(x, y, color, count) {
      if (!G) return;
      ctxFx.save();
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2, d = 14 + Math.random() * 42;
        ctxFx.fillStyle = color + '99'; ctxFx.beginPath();
        ctxFx.arc(x - G.camX + Math.cos(a) * d * .3, y - G.camY + Math.sin(a) * d * .3, 2 + Math.random() * 3.5, 0, Math.PI * 2); ctxFx.fill();
      }
      ctxFx.restore(); setTimeout(() => ctxFx.clearRect(0, 0, cvFx.width, cvFx.height), 220);
    }

        + '</div>'
        + '<div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:10px;margin-bottom:10px;">'
        + '<div style="font-family:Cinzel,serif;font-size:.72rem;color:var(--muted);margin-bottom:4px">TU CÓDIGO DE RECLUTAMIENTO</div>'
        + '<div style="font-family:Cinzel,serif;font-size:1.6rem;color:var(--gold2);letter-spacing:.3em;text-align:center">' + myCode + '</div>'
        + '<div style="font-size:.62rem;color:var(--muted);text-align:center;margin-top:4px">Comparte este código con tus amigos para que se unan</div>'
        + '</div>'
        + '<div style="margin-bottom:10px;">'
        + '<div style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:5px;font-size:.78rem">Reclutar con código:</div>'
        + '<div style="display:flex;gap:8px;">'
        + '<input class="ginp" id="recruit-code" placeholder="Código del amigo..." style="flex:1;letter-spacing:.2em;">'
        + '<button onclick="recruitMember()" class="btn" style="max-width:100px;font-size:.7rem;">+ Reclutar</button>'
        + '</div>'
        + '</div>'
        + '<div style="height:1px;background:rgba(201,168,76,.18);margin:9px 0"></div>'
        + '<div style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:7px">Miembros del Guild</div>'
        // Player
        + '<div class="gmb">'
        + '<div style="width:32px;height:36px;flex-shrink:0"><svg width="32" height="36" viewBox="0 0 72 80"><use href="#' + c.svgId + '"/></svg></div>'
        + '<span style="font-family:Cinzel,serif">' + G.p.name + '</span>'
        + '<span style="margin-left:auto;color:var(--gold);font-size:.7rem">Lv' + G.p.level + ' — Líder</span></div>';
      FAKE_PLAYERS.forEach(fp => {
        h += '<div class="gmb"><div style="width:32px;height:36px;flex-shrink:0"><svg width="32" height="36" viewBox="0 0 72 80"><use href="#' + fp.svgId + '"/></svg></div>'
          + '<span style="font-family:Cinzel,serif;color:' + fp.col + '">' + fp.name + '</span>'
          + '<span style="margin-left:auto;color:var(--muted);font-size:.7rem">Lv' + fp.level + '</span></div>';
      });
      // Show recruited members
      const guild = JSON.parse(localStorage.getItem('iaqGuild_' + G.p.name) || '[]');
      guild.forEach(m => {
        h += '<div class="gmb"><span style="font-size:1.2rem">⚔️</span>'
          + '<span style="font-family:Cinzel,serif;color:#88ffcc">' + m.name + '</span>'
          + '<span style="margin-left:auto;color:var(--muted);font-size:.7rem">Reclutado</span></div>';
      });
      document.getElementById('guild-c').innerHTML = h;
    }
    function saveGuild() { const v = document.getElementById('ginp'); if (v && v.value.trim() && G) G.p.guild = v.value.trim(); toast('🛡️ Guild actualizada'); }
    function recruitMember() {
      const code = document.getElementById('recruit-code').value.trim().toUpperCase();
      if (!code) { toast('Ingresa un código'); return; }
      const accounts = getAccounts();
      let found = null;
      Object.values(accounts).forEach(a => { if (a.code === code) found = a; });
      if (!found) { toast('Código no encontrado. Verifica con tu amigo.'); return; }
      if (found.name === G.p.name) { toast('No puedes reclutarte a ti mismo 😄'); return; }
      const guildKey = 'iaqGuild_' + G.p.name;
      const guild = JSON.parse(localStorage.getItem(guildKey) || '[]');
      if (guild.find(m => m.name === found.name)) { toast(found.name + ' ya está en el guild'); return; }
      guild.push({ name: found.name, code });
      localStorage.setItem(guildKey, JSON.stringify(guild));
      toast('🎉 ' + found.name + ' se unió al guild!', 4000);
      document.getElementById('recruit-code').value = '';
      renderGuild();
    }

    // ── Ranking ──
    function renderRanking() {
      if (!G) return;
      const medals = ['🥇', '🥈', '🥉', '4', '5', '6'];
      const myRow = { name: G.p.name, lv: G.p.level, score: G.score || 0, cls: CLASSES[G.p.cls].name, isMe: true };
      const rows = [...RANK_FAKE, myRow].sort((a, b) => b.score - a.score);
      document.getElementById('rank-c').innerHTML = rows.map((r, i) =>
        '<div class="rkr" style="' + (r.isMe ? 'border-color:var(--gold)' : '') + '">'
        + '<span class="rkp">' + (medals[i] || i + 1) + '</span>'
        + '<span style="font-family:Cinzel,serif;font-size:.82rem;flex:1;color:' + (r.isMe ? 'var(--gold)' : 'var(--text)') + '">'
        + r.name + (r.isMe ? ' ◀ tú' : '') + '</span>'
        + '<span style="color:var(--muted);font-size:.68rem">' + r.cls + '</span>'
        + '<span style="color:var(--muted);font-size:.68rem;margin-left:6px">Lv' + r.lv + '</span>'
        + '<span style="color:var(--gold);font-size:.78rem;margin-left:8px">' + r.score + '</span></div>').join('');
    }

    // ── Daily ──
    function showDailyModal() { if (!G) return; openM('daily'); }
    function renderDaily() {
      const today = new Date().toDateString();
      const saved = JSON.parse(localStorage.getItem('iaqDaily') || '{}');
      const claimed = saved.date === today; const day = saved.streak || 1;
      let h = '<div style="text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:10px">'
        + (claimed ? '✓ Ya reclamaste hoy. Vuelve mañana.' : '¡Reclama tu recompensa de hoy!') + '</div><div class="dgrid">';
      DAILY_REWARDS.forEach((r, i) => {
        const isClaimed = i + 1 < day, isToday = i + 1 === day && !claimed;
        const cls = 'dbox' + (isClaimed ? ' claimed' : '') + (isToday ? ' today' : '');
        const onclick = isToday ? ' onclick="claimDaily(' + i + ')"' : '';
        h += '<div class="' + cls + '"' + onclick + '>'
          + '<span style="font-size:1.35rem">' + r.icon + '</span>'
          + '<span style="color:var(--gold);font-size:.54rem">Día ' + r.day + '</span>'
          + '<span style="color:var(--muted);font-size:.52rem">' + r.label + '</span></div>';
      });
      h += '</div><div style="text-align:center;font-size:.7rem;color:var(--muted)">Racha: ' + day + ' día(s)</div>';
      document.getElementById('daily-c').innerHTML = h;
    }
    function claimDaily(idx) {
      if (!G) return; const today = new Date().toDateString();
      const saved = JSON.parse(localStorage.getItem('iaqDaily') || '{}');
      if (saved.date === today) { toast('Ya reclamaste hoy'); return; }
      const streak = Math.min(7, (saved.streak || 0) + 1); const next = streak >= 7 ? 1 : streak + 1;
      localStorage.setItem('iaqDaily', JSON.stringify({ date: today, streak: next }));
      const r = DAILY_REWARDS[idx];
      if (r.type === 'gold') { G.p.gold += r.amount; toast('🎁 +' + r.amount + ' Oro!'); }
      if (r.type === 'xp') { G.p.xp += r.amount; checkLevelUp(); toast('🎁 +' + r.amount + ' XP!'); }
      if (r.type === 'item') { G.p.inventory.push({ ...r.item, id: Date.now() }); toast('🎁 ' + r.item.name + ' añadido!'); }
      updateHUD(); renderDaily(); buildQuickbar();
    }

    // ── Chat ──
    function toggleChat() { document.getElementById('chat').classList.toggle('on'); }
    function sendChat() {
      const inp = document.getElementById('chat-in'); if (!inp.value.trim()) return;
      addChat(G ? G.p.name : 'Angelo', inp.value, G ? CLASSES[G.p.cls].col : '#c9a84c'); inp.value = '';
    }
    function addChat(name, msg, col) {
      const cm = document.getElementById('chat-msgs'); const el = document.createElement('div');
      el.innerHTML = '<span style="color:' + col + ';font-family:Cinzel,serif;font-size:.68rem">' + name + ':</span> ' + msg;
      cm.appendChild(el); cm.scrollTop = cm.scrollHeight;
    }
    function startFakeChat() {
      const msgs = ['¡Boss en el dungeon!', 'Alguien quiere trade?', 'Drop legendario! 🌟', 'V2 es épico 🔥', '¡Combo x12!', 'Al nivel 8 🎉', 'La forja es OP', 'SVG monstruos son increíbles', '¿Alguien en Volcán?', '¡Lich Rey en el Abismo!'];
      setInterval(() => {
        if (!G || !G.running) return;
        const fp = G.fakePlayers[Math.floor(Math.random() * G.fakePlayers.length)];
        addChat(fp.name, msgs[Math.floor(Math.random() * msgs.length)], fp.col);
      }, 5500);
    }

    // ── Save ──
    function saveGame() {
      if (!G || !G.p) return;
      localStorage.setItem('iaqSave', JSON.stringify({ p: G.p, quests: G.quests, mapKey: G.mapKey, score: G.score || 0 }));
      // Save to account if logged in
      const accounts = getAccounts();
      const key = (G.p.name || '').toLowerCase();
      if (accounts[key]) { accounts[key].lastSeen = new Date().toISOString(); saveAccounts(accounts); }
    }

    // ── Game over / Win ──
    function gameOver() {
      if (!G) return; G.running = false; saveGame(); hideBossBar(); const p = G.p;
      document.getElementById('et').textContent = '💀 Has Muerto';
      document.getElementById('et').className = 'et death';
      document.getElementById('estats').innerHTML =
        [['Nivel', p.level], ['Bajas', p.kills], ['Oro', p.gold], ['Daño', p.totalDmg], ['Combo', p.maxCombo + 'x'], ['Score', G.score]]
          .map(([l, v]) => '<div class="esx"><div class="esv">' + v + '</div><div class="esl">' + l + '</div></div>').join('');
      document.getElementById('end').classList.add('on');
    }
    function gameWin() {
      if (!G) return; G.running = false; saveGame();
      document.getElementById('et').textContent = '🏆 ¡Victoria!';
      document.getElementById('et').className = 'et win';
      document.getElementById('estats').innerHTML =
        [['Nivel', G.p.level], ['Bajas', G.p.kills], ['Oro', G.p.gold], ['Score', G.score], ['Combo', G.p.maxCombo + 'x'], ['Mapas', G.visitedMaps.size]]
          .map(([l, v]) => '<div class="esx"><div class="esv">' + v + '</div><div class="esl">' + l + '</div></div>').join('');
      document.getElementById('end').classList.add('on');
    }
    function backToTitle() {
      document.getElementById('end').classList.remove('on');
      document.getElementById('hud').classList.remove('on');
      document.getElementById('title').style.display = 'flex';
      G = null; wxParts = []; logLines = []; shakeAmt = 0;
      cvW.style.transform = ''; hideBossBar();
      document.getElementById('hotbar').innerHTML = '';
      document.getElementById('clog').innerHTML = '';
      goPhase(0); requestAnimationFrame(bgLoop);
    }

    // ══════════════════════════════════════════
    //  MAIN LOOP
    // ══════════════════════════════════════════
    function loop(ts) {
      const dt = Math.min((ts - lastT) / 1000, .1); lastT = ts;
      drawBg();
      if (G && G.running) { applyJoystick(); update(dt); drawWorld(); }
      requestAnimationFrame(loop);
    }
    function bgLoop(ts) { drawBg(); if (!G) requestAnimationFrame(bgLoop); }

    // Boot
    preloadSVGs().then(() => { requestAnimationFrame(bgLoop); });
    preloadPNGs().then(() => console.log('PNGs listos para el canvas'));
  </script>
</body>

</html>
